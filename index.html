<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lê Võ Quyết Thắng - Personal Website</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 text-gray-900 font-sans">
    <div class="container mx-auto px-4 py-8">
        <!-- Header Section -->
        <header class="text-center mb-12">
            <div class="w-48 h-48 mx-auto mb-6 rounded-full overflow-hidden shadow-lg">
                <img src="profile.jpg" alt="Lê Võ Quyết Thắng" class="w-full h-full object-cover">
            </div>
            <h1 class="text-4xl font-bold mb-2">Lê Võ Quyết Thắng</h1>
            <p class="text-xl text-gray-600" id="professional-title">AI Engineer</p>
        </header>

        <!-- About Section -->
        <section id="about" class="bg-white shadow-md rounded-lg p-8 mb-8">
            <h2 class="text-2xl font-semibold mb-4">About Me</h2>
            <p class="text-gray-700" id="about-description">
                I'm a passionate AI Engineer with a focus on Machine Learning and Data Science.
            </p>
        </section>

        <!-- Education Section -->
        <section id="education" class="mb-8">
            <h2 class="text-2xl font-semibold mb-4">Education</h2>
            <!-- Content will be populated by JavaScript -->
        </section>
        <section id="experience" class="bg-white shadow-md rounded-lg p-8 mb-8">
            <h2 class="text-2xl font-semibold mb-4">Experience</h2>
            <div class="space-y-6" id="experience-list">
                <!-- Experience cards will be dynamically added here -->
            </div>
        </section>
        <!-- Skills Section -->
        <section id="skills" class="bg-white shadow-md rounded-lg p-8 mb-8">
            <h2 class="text-2xl font-semibold mb-4">Skills</h2>
            <div class="flex flex-wrap gap-4" id="skills-list">
                <span class="bg-blue-100 text-blue-800 px-4 py-2 rounded-full">Python</span>
                <span class="bg-green-100 text-green-800 px-4 py-2 rounded-full">TensorFlow</span>
                <span class="bg-purple-100 text-purple-800 px-4 py-2 rounded-full">PyTorch</span>
                <span class="bg-red-100 text-red-800 px-4 py-2 rounded-full">Machine Learning</span>
                <span class="bg-yellow-100 text-yellow-800 px-4 py-2 rounded-full">HuggingFace</span>
            </div>
        </section>
        <!-- Publications Section -->
        <section id="publications" class="bg-white shadow-md rounded-lg p-8 mb-8">
            <h2 class="text-2xl font-semibold mb-4">Publications</h2>
            <div class="grid gap-6" id="publications-list">
                <!-- Publication cards will be dynamically added here -->
            </div>
        </section>
        <!-- Projects Section -->
        <section id="projects" class="bg-white shadow-md rounded-lg p-8 mb-8">
            <h2 class="text-2xl font-semibold mb-4">Projects</h2>
            <div class="grid md:grid-cols-2 gap-6" id="projects-list">
                <!-- Project cards will be dynamically added here -->
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="bg-white shadow-md rounded-lg p-8">
            <h2 class="text-2xl font-semibold mb-4">Contact Me</h2>
            <div class="flex justify-center space-x-6">
                <a href="https://www.linkedin.com/in/le-vo-quyet-thang-dev/" target="_blank" class="text-3xl text-blue-600 hover:text-blue-800">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="https://github.com/vualidon" target="_blank" class="text-3xl text-gray-800 hover:text-gray-600">
                    <i class="fab fa-github"></i>
                </a>
                <a href="mailto:quyetthanglevo@gmail.com" class="text-3xl text-red-600 hover:text-red-800">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
